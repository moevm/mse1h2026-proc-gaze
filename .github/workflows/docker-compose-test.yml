name: Docker Compose Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-docker-compose:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Start Docker Compose services with environment
      run: |
        export POSTGRES_DB=gaze_db
        export POSTGRES_USER=gaze_user
        export POSTGRES_PASSWORD=password
        export DATA_DIR=/data
        export DATABASE_URL=postgresql+asyncpg://gaze_user:password@db:5432/gaze_db
        export AMQP_URL=amqp://guest:guest@rabbitmq:5672/
        export AMQP_QUEUE=tracking.jobs
        export AMQP_RESULT_QUEUE=tracking.results
        export MODELS_URL=https://raw.githubusercontent.com/jcdkiki/gaze-models/v2/
        docker compose up -d
        echo "Waiting for services to start..."
        sleep 30

    - name: Check container status
      run: |
        bash ci/check-containers.sh