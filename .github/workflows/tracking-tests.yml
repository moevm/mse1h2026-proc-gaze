name: Tracking Unit Tests

on:
  push:
    paths:
      - 'tracking/**'
      - '.github/workflows/tracking-tests.yml'
  pull_request:
    paths:
      - 'tracking/**'
      - '.github/workflows/tracking-tests.yml'

jobs:
  tracking-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build \
            --target test \
            --build-arg MODELS_URL=https://github.com/jcdkiki/gaze-models/raw/refs/heads/main/intel.tar.gz \
            -t tracking-test \
            tracking/

      - name: Run tests
        run: docker run --rm tracking-test
