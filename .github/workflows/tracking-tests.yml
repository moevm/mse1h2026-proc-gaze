name: Tracking Unit Tests

on:
  push:
    paths:
      - 'tracking/**'
      - '.github/workflows/tracking-tests.yml'
  pull_request:
    paths:
      - 'tracking/**'
      - '.github/workflows/tracking-tests.yml'

jobs:
  tracking-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pytest pytest-asyncio

      - name: Run tracking unit tests
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: python -m pytest tracking/tests -q
