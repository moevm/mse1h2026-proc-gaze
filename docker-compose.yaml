services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: tracking-backend:latest
    environment:
      DATA_DIR: ${DATA_DIR}
      DATABASE_URL: ${DATABASE_URL}
      AMQP_URL: ${AMQP_URL}
      AMQP_QUEUE: ${AMQP_QUEUE}
      AMQP_RESULT_QUEUE: ${AMQP_RESULT_QUEUE}
    volumes:
      - shared_data:/data
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
  tracker:
    build:
      context: ./tracking
      dockerfile: Dockerfile
      args:
        MODELS_URL: ${MODELS_URL}
    image: tracking-tracker:latest
    environment:
      DATA_DIR: ${DATA_DIR}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AMQP_URL: ${AMQP_URL}
      AMQP_QUEUE: ${AMQP_QUEUE}
      AMQP_RESULT_QUEUE: ${AMQP_RESULT_QUEUE}
    volumes:
      - shared_data:/data
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      image: tracking-frontend:latest
      ports:
        - "80:80"
      depends_on:
        - backend

  db-seed:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend/db:/scripts
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      sh -c "
        echo 'Waiting for database tables to be created by backend...';
        until psql -h db -U $$POSTGRES_USER -d $$POSTGRES_DB -c \"SELECT 1 FROM student LIMIT 1;\" 2>/dev/null; do
          echo 'Tables not ready yet (student table not found), waiting...';
          sleep 3;
        done;
        
        echo 'Tables are ready! Checking if data already exists...';
        STUDENT_COUNT=$$(psql -h db -U $$POSTGRES_USER -d $$POSTGRES_DB -t -c \"SELECT COUNT(*) FROM student;\" | xargs);
        
        if [ \"$$STUDENT_COUNT\" -eq 0 ]; then
          echo 'No data found, executing SQL seed scripts...';
          for script in /scripts/*.sql; do
            if [ -f \"$$script\" ]; then
              echo \"Running $$script\";
              psql -h db -U $$POSTGRES_USER -d $$POSTGRES_DB -f \"$$script\";
            fi
          done;
          echo 'Seed data imported successfully!';
        else
          echo \"Data already exists ($$STUDENT_COUNT records). Skipping seed.\";
        fi
      "
    restart: "no"

volumes:
  shared_data:
  pgdata:
